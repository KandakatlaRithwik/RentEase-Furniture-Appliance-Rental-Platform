services:
  - type: web
    name: rentease-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # set in Render dashboard
      - key: JWT_SECRET
        sync: false   # set in Render dashboard
      - key: FRONTEND_URL
        sync: false   # set in Render dashboard
      - key: EMAIL_USER
        sync: false   # optional
      - key: EMAIL_PASS
        sync: false   # optional
    healthCheckPath: /
